{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
    <header>
        <a class="position-absolute start-0" href="{% url 'home' %}">Home</a>
        <h1 class="text-center flex-grow-1">Library Management System</h1>

        <form method="POST" action="{% url 'logout' %}" class="mx-auto">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary" style="background-color:  #235347; padding: 0.5rem 1rem; margin-top: 0rem; font-size: 1.5rem;">Logout</button>
        </form>
    </header>

    <section>
        {% block content%}
            
        {% endblock %}
    </section>

    <footer>
        <h2>Copyright@2025 Shreeti HCOE</h2>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
